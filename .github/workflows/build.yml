name: PokeCardStore
on:
    push: 
        branches: [main, dev]
    pull_request: 
        branches: [main]
jobs:
    install:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
                
            - name: Install dependencies
              run: npm install
    test:
        runs-on: ubuntu-latest
        needs: [install]

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            
            - run: npm install
            - name: Test
              run: npm test
    build:
        runs-on: ubuntu-latest
        needs: [test]

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            - run: npm install
            - name: Build
              run: npm run build
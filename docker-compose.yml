services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: pokecardstore-frontend:latest
    container_name: pokecardstore-frontend
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    volumes:
      - nginx_logs:/var/log/nginx
    networks:
      - pokecardstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  pokecardstore-network:
    driver: bridge

volumes:
  nginx_logs:
    driver: local